# Nixpacks build config for Coolify deploys.
# Pinned to .tool-versions (elixir 1.19.5-otp-27, erlang 27.3.4.9,
# nodejs 22.21.1).
#
# nixpkgsArchive is the nixpkgs-unstable channel revision from 2026-06-11,
# where beam.packages.erlang_27.elixir_1_19 and nodejs_22 all resolve.
#
# We pin the exact BEAM pair via the scoped beam.packages attribute instead
# of letting the elixir provider choose. The provider's version map tops out
# at elixir_1_17 and would otherwise fall back to the archive's default
# `elixir` attribute, which is paired with the default Erlang (28 at this
# archive) — an OTP we don't test against. A single scoped attribute also
# avoids the Erlang-leak problem that pinning `elixir_X_Y` + `erlang_XX`
# separately had: the elixir package brings its own matching Erlang.
#
# Because we override nixPkgs (no "..."), the provider's gcc/gnumake
# additions are dropped, so they are listed explicitly — bcrypt_elixir
# compiles a NIF. Node comes from the same archive so the libstdc++ ABI
# matches the toolchain's gcc.
providers = ["elixir"]

[phases.setup]
nixPkgs = ["beam.packages.erlang_27.elixir_1_19", "gcc", "gnumake", "nodejs_22"]
nixpkgsArchive = "8837df679f5e015f7ddd924e89b45a217fd34723"

[phases.install]
cmds = [
  "mix local.hex --force",
  "mix local.rebar --force",
  "mix deps.get",
  "npm --prefix assets ci --no-audit --progress=false",
]

[phases.build]
cmds = [
  "mix deps.compile",
  "mix assets.deploy",
  "mix compile",
  "mix release",
  # Symlink /app/bin -> the release bin/ so the start command is the clean
  # /app/bin/server (matching the prior Dockerfile's entrypoint). A symlink
  # is used instead of `mv` because Nixpacks runs `COPY . /app` after the
  # build phase, which would partially undo a destructive move; the
  # symlink survives because the source tree has no top-level bin/.
  "ln -sfn /app/_build/prod/rel/stream_closed_captioner_phoenix/bin /app/bin",
]

[start]
cmd = "/app/bin/server"

[variables]
MIX_ENV = "prod"
LANG = "en_US.UTF-8"
